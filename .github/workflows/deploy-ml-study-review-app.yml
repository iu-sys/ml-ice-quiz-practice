name: Deploy ML Study Review App

on:
  push:
    branches: ["main"]
    paths:
      - "ml-study-review-app/**"
      - ".github/workflows/deploy-ml-study-review-app.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ml-study-review-app/package-lock.json

      - name: Install dependencies
        working-directory: ml-study-review-app
        run: npm ci

      - name: Build static export
        working-directory: ml-study-review-app
        env:
          GITHUB_PAGES: "true"
        run: |
          npm run build
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ml-study-review-app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
